<svg
  version="1.1"
  baseProfile="full"
  width="100%" height="100%"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1400 800"
>
  <!-- 左上角圆角矩形 -->
  <rect x="120" y="80" rx="25" ry="25" width="120" height="120" stroke="#8B5CF6" fill="#8B5CF6">
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="16s" type="rotate" values="0 180 140; 15 180 140; 0 180 140" keyTimes="0; 0.5; 1" repeatCount="indefinite" />
    <animateMotion path="M 0 0 L 30 20 L 0 0" dur="9s" repeatCount="indefinite" />
  </rect>

  <!-- 右上角圆角正方形 -->
  <rect x="950" y="80" rx="30" ry="30" width="100" height="100" stroke="#10B981" fill="#10B981">
    <animateMotion path="M 0 0 L -20 30 L 0 0" dur="10s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="14s" type="rotate" values="0 1000 130; -10 1000 130; 0 1000 130" keyTimes="0; 0.5; 1" repeatCount="indefinite" />
  </rect>

  <!-- 中部左侧圆角矩形 -->
  <rect x="250" y="300" rx="20" ry="20" width="90" height="90" stroke="#F59E0B" fill="#F59E0B">
    <animateMotion path="M 0 0 L 25 -15 L 0 0" dur="8s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="12s" type="rotate" from="-5 295 345" to="355 295 345" repeatCount="indefinite" />
  </rect>

  <rect x="1300" y="400" rx="40" ry="40" width="300" height="300" stroke="#5D67E8" fill="#5D67E8">
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="20s" type="rotate" from="-30 1450 550" to="390 1450 550" repeatCount="indefinite" />
  </rect>

  <path d="M 100 350 A 150 150 0 1 1 400 350 Q400 370 380 370 L 250 370 L 120 370 Q100 370 100 350" stroke="rgb(253, 214, 99)" fill="rgb(253, 214, 99)">
    <animateMotion path="M 800 -200 L 800 -400 L 800 -200" dur="15s" begin="0s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="18s" type="rotate" values="0 210 530 ; -60 210 530 ; 0 210 530" keyTimes="0 ; 0.5 ; 1" repeatCount="indefinite" />
  </path>

  <circle cx="200" cy="150" r="20" stroke="#5D67E8" fill="#5D67E8">
    <animateMotion path="M 0 0 L 80 40 Z" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- 三角形 -->
  <path d="M 165 580 L 270 580 Q275 578 270 570 L 223 483 Q220 480 217 483 L 165 570 Q160 578 165 580" stroke="rgb(238, 103, 92)" fill="rgb(238, 103, 92)">
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="20s" type="rotate" from="-30 210 530" to="390 210 530" repeatCount="indefinite" />
  </path>

  <circle cx="1200" cy="600" r="30" stroke="rgb(241, 243, 244)" fill="rgb(241, 243, 244)">
    <animateMotion path="M 0 0 L -40 80 Z" dur="6s" repeatCount="indefinite" />
  </circle>

  <path d="M 100 350 A 40 40 0 1 1 180 350 L 180 430 A 40 40 0 1 1 100 430 Z" stroke="rgb(241, 243, 244)" fill="rgb(241, 243, 244)">
    <animateMotion path="M 140 390 L 220 320 L 140 390" dur="15s" begin="0s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="18s" type="rotate" values="0 140 390; -90 140 390; 0 140 390" keyTimes="0 ; 0.5 ; 1" repeatCount="indefinite" />
  </path>

  <rect x="400" y="600" rx="40" ry="40" width="100" height="100" stroke="rgb(129, 201, 149)" fill="rgb(129, 201, 149)">
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="20s" type="rotate" from="-60 550 750" to="420 550 750" repeatCount="indefinite" />
  </rect>

  <!-- 六边形 -->
  <path d="M 850 150 L 900 125 L 950 150 L 950 200 L 900 225 L 850 200 Z" stroke="rgb(111, 134, 237)" fill="rgb(111, 134, 237)">
    <animateMotion path="M 0 0 L 60 -40 L 0 0" dur="12s" begin="0s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="15s" type="rotate" values="0 900 175; 45 900 175; 0 900 175" keyTimes="0 ; 0.5 ; 1" repeatCount="indefinite" />
  </path>

  <!-- 星形 -->
  <path d="M 700 700 L 720 650 L 750 650 L 725 620 L 740 580 L 700 600 L 660 580 L 675 620 L 650 650 L 680 650 Z" stroke="rgb(248, 113, 113)" fill="rgb(248, 113, 113)">
    <animateMotion path="M 0 0 L -30 50 L 0 0" dur="8s" begin="1s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="16s" type="rotate" from="0 700 630" to="360 700 630" repeatCount="indefinite" />
  </path>

  <!-- 波浪线 -->
  <path d="M 300 250 Q 350 200, 400 250 T 500 250" stroke="rgb(253, 186, 116)" stroke-width="12" fill="none">
    <animateMotion path="M 0 0 L 20 -30 L 0 0" dur="10s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="14s" type="rotate" values="-5 400 250; 5 400 250; -5 400 250" keyTimes="0 ; 0.5 ; 1" repeatCount="indefinite" />
  </path>

  <!-- 菱形 -->
  <path d="M 1000 400 L 1050 450 L 1000 500 L 950 450 Z" stroke="rgb(147, 197, 253)" fill="rgb(147, 197, 253)">
    <animateMotion path="M 0 0 L 40 30 L 0 60 L -40 30 L 0 0" dur="14s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite" />
  </path>

  <!-- 右下角圆角矩形 -->
  <rect x="1050" y="650" rx="35" ry="35" width="140" height="110" stroke="#EC4899" fill="#EC4899">
    <animateMotion path="M 0 0 L -15 25 L 0 0" dur="11s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="18s" type="rotate" values="0 1120 705; -20 1120 705; 0 1120 705" keyTimes="0; 0.5; 1" repeatCount="indefinite" />
  </rect>

  <!-- 中下部圆角矩形 -->
  <rect x="550" y="700" rx="25" ry="25" width="100" height="80" stroke="#64748B" fill="#64748B">
    <animateMotion path="M 0 0 L 20 -10 L 0 0" dur="9s" repeatCount="indefinite" />
    <animateTransform attributeType="XML" attributeName="transform" begin="0s" dur="15s" type="rotate" from="-8 600 740" to="352 600 740" repeatCount="indefinite" />
  </rect>
</svg>
