<svg
  version="1.1"
  baseProfile="full"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 700"
  style="background-color: #1a1a1a;"
>
  <rect x="450" y="250" rx="30" ry="30" width="300" height="200" fill="#8B5CF6">
    <animateTransform 
      attributeName="transform"
      type="rotate"
      values="0 600 350; 5 600 350; -5 600 350; 0 600 350"
      keyTimes="0; 0.25; 0.75; 1"
      dur="15s"
      repeatCount="indefinite" />
  </rect>

  <path d="M 600 320 L 612 345 L 640 348 L 618 365 L 625 392 L 600 378 L 575 392 L 582 365 L 560 348 L 588 345 Z" fill="#FBBF24">
    <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 600 350"
        to="360 600 350"
        dur="25s"
        repeatCount="indefinite" />
  </path>

  <polygon points="250,120 310,120 280,170" fill="#34D399">
    <animateTransform 
      attributeName="transform"
      type="rotate"
      values="-8 280 170; 8 280 170; -8 280 170" 
      keyTimes="0; 0.5; 1"
      dur="8s"
      repeatCount="indefinite"/>
  </polygon>
  <polygon points="950,120 890,120 920,170" fill="#34D399">
    <animateTransform 
      attributeName="transform"
      type="rotate"
      values="8 920 170; -8 920 170; 8 920 170"
      keyTimes="0; 0.5; 1"
      dur="8s"
      repeatCount="indefinite"/>
  </polygon>

  <rect x="280" y="520" rx="15" ry="15" width="80" height="80" fill="#60A5FA" opacity="0.9">
     <animateMotion
      path="M 0 0 C 30 -50, -30 -100, 0 0"
      dur="12s"
      repeatCount="indefinite" />
     <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 320 560"
        to="360 320 560"
        dur="18s"
        repeatCount="indefinite" />
  </rect>
  <rect x="840" y="520" rx="15" ry="15" width="80" height="80" fill="#60A5FA" opacity="0.9">
     <animateMotion
      path="M 0 0 C -30 -50, 30 -100, 0 0"
      dur="12s"
      repeatCount="indefinite" />
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 880 560"
        to="-360 880 560"
        dur="18s"
        repeatCount="indefinite" />
  </rect>


  <circle cx="350" cy="350" r="30" fill="#FFFFFF">
     <animateMotion 
      path="M 0 0 A 40 80 0 1 1 0 -0.1 Z" 
      dur="10s" 
      repeatCount="indefinite" 
      rotate="auto"/>
     <animate attributeName="opacity" values="0; 1; 0" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="850" cy="350" r="30" fill="#FFFFFF">
    <animateMotion 
      path="M 0 0 A 40 80 0 1 0 0 -0.1 Z" 
      dur="10s" 
      repeatCount="indefinite" 
      rotate="auto"/>
    <animate attributeName="opacity" values="0; 1; 0" dur="10s" repeatCount="indefinite" />
  </circle>

</svg>